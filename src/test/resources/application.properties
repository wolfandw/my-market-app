spring.application.name=my-market-app

spring.r2dbc.url=r2dbc:h2:mem:///~/testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;
spring.r2dbc.username=sa
spring.r2dbc.password=
spring.r2dbc.pool.enabled=true
spring.r2dbc.pool.initial-size=10
spring.r2dbc.pool.max-size=50
spring.r2dbc.pool.max-idle-time=30s
spring.r2dbc.pool.max-life-time=10m
spring.r2dbc.pool.validation-query=SELECT 1

logging.level.io.r2dbc=DEBUG 

spring.liquibase.url=jdbc:h2:mem:~/testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;
spring.liquibase.user=sa
spring.liquibase.password=
spring.liquibase.contexts=dev
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.xml

mymarket.upload.images.dir=upload/images-test
mymarket.upload.images.dir.test=static/images-test